<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Пісні для ефіру</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      padding: 0;
      line-height: 1.6;
      font-size: 16px;
    }

    h2 {
      text-align: center;
    }

    #searchInput {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      box-sizing: border-box;
      font-size: 16px;
    }

    button {
      padding: 8px 12px;
      margin: 4px 0;
      font-size: 16px;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }

    th, td {
      padding: 10px;
      text-align: left;
      border: 1px solid #ddd;
    }

    tr:hover {
      background-color: #f1f1f1;
    }

    #lyricsBox {
      white-space: pre-line;
      padding: 10px;
      border: 1px solid #ccc;
      background-color: #f9f9f9;
      margin-bottom: 20px;
    }

    #toTopBtn {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 99;
      border: none;
      outline: none;
      background-color: #333;
      color: white;
      cursor: pointer;
      padding: 10px 15px;
      border-radius: 4px;
      font-size: 14px;
    }

    #toTopBtn:hover {
      background-color: #555;
    }

    @media (max-width: 600px) {
      body {
        font-size: 14px;
      }

      #searchInput {
        font-size: 14px;
      }

      button {
        font-size: 14px;
      }

      th, td {
        font-size: 14px;
      }

      #toTopBtn {
        font-size: 12px;
        padding: 8px 12px;
      }
    }
  </style>
</head>
<body>

<h2>Пісні для ефіру</h2>

<input type="text" id="searchInput" onkeyup="searchSongs()" placeholder="Пошук пісень..." />
<button onclick="clearSearch()">Очистити</button>

<table id="songsTable">
  <tr><th>Назва пісні</th></tr>
  <tr onclick="showLyrics('song1')"><td>Без обмежень - Якби</td></tr>
  <tr onclick="showLyrics('song2')"><td>Скрябін - Люди як кораблі</td></tr>
  <tr onclick="showLyrics('song3')"><td>Скрябін - Спи собі сама</td></tr>
</table>

<div id="lyricsBox">
  <strong>Натисни на пісню, щоб побачити текст</strong>
</div>

<button onclick="changeFontSize(2)">Збільшити текст</button>
<button onclick="changeFontSize(-2)">Зменшити текст</button>

<button id="toTopBtn" onclick="scrollToTop()">На початок</button>

<script>
  const lyrics = {
    song1: `Вітром якби стати мені...
(повний текст залиш той, який у тебе був)`,
    song2: `Я не твій брат, ти не сестра моя...
(і т.д.)`,
    song3: `Часом буває так, що хочеш почути...
(і т.д.)`
  };

  function showLyrics(songId) {
    const box = document.getElementById('lyricsBox');
    box.innerText = lyrics[songId] || 'Текст відсутній.';
    window.scrollTo(0, document.body.scrollHeight);
  }

  function changeFontSize(change) {
    const box = document.getElementById('lyricsBox');
    const currentSize = parseInt(window.getComputedStyle(box).fontSize);
    box.style.fontSize = `${currentSize + change}px`;
  }

  function searchSongs() {
    const input = document.getElementById('searchInput');
    const filter = input.value.toLowerCase();
    const table = document.getElementById('songsTable');
    const rows = table.getElementsByTagName('tr');
    for (let i = 1; i < rows.length; i++) {
      const cell = rows[i].getElementsByTagName('td')[0];
      if (cell) {
        const text = cell.textContent || cell.innerText;
        rows[i].style.display = text.toLowerCase().includes(filter) ? '' : 'none';
      }
    }
  }

  function clearSearch() {
    document.getElementById('searchInput').value = '';
    searchSongs();
  }

  function scrollToTop() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  window.onscroll = function () {
    const btn = document.getElementById("toTopBtn");
    if (btn) {
      btn.style.display =
        document.body.scrollTop > 100 || document.documentElement.scrollTop > 100
          ? "block"
          : "none";
    }
  };
</script>

</body>
</html>
